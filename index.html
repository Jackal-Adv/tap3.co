<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAP³ — Talent Acquisition Partner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --brand-purple: #301c57;
  --brand-orange: #EB6320;
  --brand-red: #DF3912;
  --brand-cream: #F9F6F1;
}
body {
  font-family: 'Montserrat', -apple-system, sans-serif;
  background: var(--brand-cream);
  color: #1a1a1a;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 24px;
}
.logo { margin-bottom: 16px; }
.logo svg { width: 300px; height: auto; }.tagline {
  font-size: 14px; font-weight: 400;
  letter-spacing: 0.10em; text-transform: uppercase;
  margin-bottom: 32px;
  line-height: 1;
  word-spacing: 0.4em;
}
.w-t { color: var(--brand-purple); }
.slot {
  display: inline-block;
  height: 1.2em;
  overflow: hidden;
  vertical-align: bottom;
  position: relative;
  word-spacing: normal;
}
.slot-inner {
  display: block;
  transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
}
.slot-word {
  display: block;
  height: 1.2em;
  line-height: 1.2em;
  text-align: center;
}
.slot-a .slot-word {
  background: linear-gradient(90deg, var(--brand-purple) 0%, var(--brand-red) 100%);
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
}
.slot-p .slot-word {
  color: var(--brand-orange);
}.divider {
  width: 60px; height: 2px;
  background: linear-gradient(90deg, var(--brand-purple), var(--brand-red), var(--brand-orange));
  margin-bottom: 32px; border-radius: 1px;
}
.message {
  font-size: 14px; font-weight: 300;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: #999; line-height: 1.7; margin-bottom: 12px;
}
.agentic {
  font-size: 14px; font-weight: 300;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--brand-purple); font-style: italic;
  margin-bottom: 48px;
}
.slogan {
  font-size: 13px; font-weight: 300;
  color: #bbb; letter-spacing: 0.04em;
  margin-bottom: 24px;
}
.contact { font-size: 13px; color: #bbb; }
.contact a { color: var(--brand-orange); text-decoration: none; transition: color 0.15s; }
.contact a:hover { color: var(--brand-purple); }
@media (max-width: 600px) {
  .logo svg { width: 200px; }
  .tagline { font-size: 11px; letter-spacing: 0.08em; }
}
</style>
</head>
<body>

<div class="logo">
  <svg viewBox="150 265 725 240" aria-label="TAP³"><defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#301c57"/><stop offset="18%" stop-color="#301c57"/><stop offset="45%" stop-color="#DF3912"/><stop offset="65%" stop-color="#EB6320"/><stop offset="100%" stop-color="#EB6320"/></linearGradient></defs><path fill="url(#grad)" d="m769.61 268.87v10.551h79.441l-41.584 46.238v8.3789h11.793c13.033 0 22.653 2.4819 29.48 7.1367 6.5167 4.9651 9.9297 11.483 9.9297 19.861 0 8.6889-3.4132 15.205-10.24 19.859-6.827 4.9651-16.447 7.1367-29.48 7.1367-9.9302 0-19.24-1.2406-27.309-4.3438-8.0683-2.7929-14.583-6.5171-18.928-11.172l-5.5859 9.3105c4.6548 4.9651 11.792 8.9984 21.102 12.102 9.3096 3.1032 19.549 4.6562 30.721 4.6562 16.447 0 29.171-3.4152 38.17-10.242 8.9993-6.827 13.654-16.135 13.654-27.307 0-10.861-4.344-19.552-12.723-26.379-8.3786-6.5167-20.172-9.9299-35.688-10.24l42.824-47.479v-8.0684zm-616.38 13.03v14.275h78.201v202.95h15.826v-202.95h78.201v-14.28zm263.88 0-99.924 217.22h17.068l90.613-199.85 90.924 199.85h17.068l-99.94-217.22zm155.18 0v14.275h77.891c22.964 0 40.652 5.2751 53.064 15.516 12.102 10.241 18.311 24.826 18.311 43.445 0 18.93-6.2081 33.515-18.311 43.445-12.413 10.241-30.101 15.205-53.064 15.205h-77.891v85.338h15.826v-71.062h62.064c27.308 0 48.72-6.2068 64.236-19.24s23.273-30.722 23.273-53.686c0-22.653-7.7575-40.652-23.273-53.686-15.516-13.033-36.928-19.551-64.236-19.551z"/></svg>
</div>
<div class="tagline"><span class="w-t">Talent</span> <span class="slot slot-a" id="slot-a"><span class="slot-inner" id="reel-a"></span></span> <span class="slot slot-p" id="slot-p"><span class="slot-inner" id="reel-p"></span></span></div>

<div class="divider"></div>

<p class="message">Recruitment as a Service.</p>
<p class="agentic">but Agentic.</p>

<p class="slogan">Are you ready to TAP your talent?</p>

<p class="contact"><a href="mailto:info@tap3.co">info@tap3.co</a></p>

<script>
const aWords = ['Acquisition', 'Automation', 'Architecture'];
const pWords = ['Partner', 'Protocol', 'Platform', 'Podcast', 'Practice', 'Pipeline', 'Playbook', 'Process', 'Positioning'];

function buildReel(el, words) {
  el.innerHTML = '';
  words.forEach(w => {
    const span = document.createElement('span');
    span.className = 'slot-word';
    span.textContent = w;
    el.appendChild(span);
  });
  // Clone first word at end for seamless loop
  const clone = document.createElement('span');
  clone.className = 'slot-word';
  clone.textContent = words[0];
  el.appendChild(clone);
}



const reelA = document.getElementById('reel-a');
const reelP = document.getElementById('reel-p');
const slotA = document.getElementById('slot-a');
const slotP = document.getElementById('slot-p');

buildReel(reelA, aWords);
buildReel(reelP, pWords);


let aIdx = 0, pIdx = 0;

const wordH = reelA.querySelector('.slot-word').offsetHeight;

function spin(reelEl, words, getIdx, setIdx) {
  const next = (getIdx() + 1) % words.length;
  const targetPos = (next === 0 ? words.length : next);
  reelEl.style.transition = 'transform 0.5s cubic-bezier(0.23, 1, 0.32, 1)';
  reelEl.style.transform = 'translateY(-' + (targetPos * wordH) + 'px)';
  if (next === 0) {
    setTimeout(() => {
      reelEl.style.transition = 'none';
      reelEl.style.transform = 'translateY(0)';
    }, 520);
  }
  setIdx(next);
}

function scheduleNext() {
  const r = Math.random();
  const delay = 3000 + Math.random() * 2000;
  setTimeout(() => {
    if (r < 0.3) {
      spin(reelA, aWords, () => aIdx, (i) => aIdx = i);
    } else {
      spin(reelP, pWords, () => pIdx, (i) => pIdx = i);
    }
    scheduleNext();
  }, delay);
}

scheduleNext();
</script>

</body>
</html>
